<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Bebi Field Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="assets/chart.umd.min.js"></script>

<style>
  :root{
    --bg: #171D14;
    --surface: #212A1C;
    --surface-2: #2A3524;
    --line: #3A4531;
    --clay: #C9793B;
    --clay-dim: #8a5228;
    --leaf: #92A85A;
    --parchment: #EFE8D8;
    --dim: #A9AA98;
    --danger: #C2453A;
    --amber: #D9A441;
    --radius: 14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--parchment);}
  body{
    font-family:'IBM Plex Sans', system-ui, sans-serif;
    font-size:15px;
    line-height:1.4;
    padding-bottom:78px;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Space Grotesk','Trebuchet MS',sans-serif; margin:0; letter-spacing:0.2px;}
  .mono{font-family:'IBM Plex Mono', ui-monospace, Consolas, monospace;}
  ::selection{background:var(--clay); color:#171D14;}

  /* ---------- header ---------- */
  #topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, #1B2317 0%, #171D14 100%);
    border-bottom:1px solid var(--line);
    padding:14px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
  }
  #topbar .brand-group{display:flex; align-items:center; gap:10px; min-width:0;}
  #topbar .brand-logo{width:42px; height:42px; border-radius:10px; object-fit:cover; flex:none; background:#fff;}
  #topbar .brand{display:flex; flex-direction:column; min-width:0;}
  #topbar .brand .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:2px;
    color:var(--leaf); text-transform:uppercase; margin-bottom:2px;
  }
  #topbar h1{font-size:19px; color:var(--parchment);}
  #topbar .sub{font-size:11.5px; color:var(--dim); margin-top:2px;}
  #settingsBtn{
    background:var(--surface-2); border:1px solid var(--line); color:var(--parchment);
    width:40px; height:40px; border-radius:10px; font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }
  #settingsBtn:active{background:var(--clay-dim);}

  /* ---------- exception banner ---------- */
  #exceptionBanner{
    margin:10px 14px 0; padding:10px 12px; border-radius:10px;
    background:rgba(194,69,58,0.14); border:1px solid rgba(194,69,58,0.45);
    color:#F0C9C4; font-size:12.5px; display:none;
  }
  #exceptionBanner b{color:#fff;}

  main{padding:14px 14px 8px;}

  /* ---------- cards ---------- */
  .card{
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:14px; margin-bottom:12px;
  }
  .card-title{
    font-family:'Space Grotesk','Trebuchet MS',sans-serif; font-size:13px;
    text-transform:uppercase; letter-spacing:1.2px; color:var(--dim); margin-bottom:10px;
  }
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .stat{
    background:var(--surface-2); border-radius:10px; padding:10px 12px;
  }
  .stat .label{font-size:11px; color:var(--dim); margin-bottom:4px;}
  .stat .value{font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:600;}
  .stat .value.small{font-size:14px;}

  /* ---------- strata bar (signature element) ---------- */
  .strata-wrap{margin-bottom:8px;}
  .strata{
    display:flex; height:34px; border-radius:8px; overflow:hidden;
    border:1px solid var(--line);
  }
  .strata .seg{height:100%; min-width:3px;}
  .strata-legend{display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:10px;}
  .strata-legend .item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--dim);}
  .strata-legend .dot{width:9px; height:9px; border-radius:3px; flex:none;}

  .rag-healthy{background:var(--leaf);}
  .rag-watch{background:var(--amber);}
  .rag-critical{background:#C2453A;}
  .rag-over{background:#7C1F18;}
  .chip{
    display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px;
    font-size:11px; font-weight:600; letter-spacing:0.2px;
  }
  .chip.healthy{background:rgba(146,168,90,0.22); color:var(--leaf);}
  .chip.watch{background:rgba(217,164,65,0.22); color:var(--amber);}
  .chip.critical{background:rgba(194,69,58,0.22); color:#EF9990;}
  .chip.over{background:rgba(124,31,24,0.35); color:#FF9C90;}
  .chip.committed{background:rgba(217,164,65,0.2); color:var(--amber);}
  .chip.actual{background:rgba(146,168,90,0.2); color:var(--leaf);}
  .chip.neutral{background:var(--surface-2); color:var(--dim);}

  /* ---------- progress bars ---------- */
  .op-row{margin-bottom:12px;}
  .op-row:last-child{margin-bottom:0;}
  .op-row .op-head{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .op-row .op-head .name{color:var(--parchment); font-weight:500;}
  .op-row .op-head .figs{font-family:'IBM Plex Mono',monospace; color:var(--dim);}
  .bar-track{height:9px; background:var(--surface-2); border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--leaf); border-radius:6px;}

  canvas{max-width:100%;}
  .chart-box{position:relative; height:220px; margin-top:6px;}

  /* ---------- lists / entries ---------- */
  .entry{
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:12px; margin-bottom:9px; display:flex; flex-direction:column; gap:6px;
  }
  .entry-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .entry-date{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--dim);}
  .entry-title{font-size:14px; font-weight:500; color:var(--parchment);}
  .entry-amount{font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600; color:var(--parchment); white-space:nowrap;}
  .entry-meta{font-size:11.5px; color:var(--dim); display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
  .entry:active{background:var(--surface-2);}

  .empty-state{
    text-align:center; padding:34px 16px; color:var(--dim); font-size:13px;
  }
  .empty-state .big{font-size:30px; margin-bottom:6px;}

  /* ---------- floating add button ---------- */
  .fab-row{position:sticky; bottom:76px; display:flex; justify-content:flex-end; pointer-events:none; margin-top:6px;}
  .fab{
    pointer-events:auto;
    background:var(--clay); color:#20140a; border:none; border-radius:26px;
    padding:13px 20px; font-family:'Space Grotesk','Trebuchet MS',sans-serif; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px; box-shadow:0 6px 18px rgba(0,0,0,0.4);
  }
  .fab:active{background:#b06a30;}

  /* ---------- bottom nav ---------- */
  #bottomnav{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    background:#151A12; border-top:1px solid var(--line);
    display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  #bottomnav button{
    flex:1; background:none; border:none; color:var(--dim);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 2px; font-family:'IBM Plex Sans',sans-serif; font-size:10.5px;
  }
  #bottomnav button .ic{font-size:19px; line-height:1;}
  #bottomnav button.active{color:var(--clay);}

  /* ---------- segmented control ---------- */
  .segment{display:flex; background:var(--surface-2); border-radius:10px; padding:3px; margin-bottom:12px;}
  .segment button{
    flex:1; padding:8px; border:none; background:none; color:var(--dim);
    border-radius:8px; font-size:12.5px; font-weight:500; font-family:'IBM Plex Sans',sans-serif;
  }
  .segment button.active{background:var(--clay); color:#20140a; font-weight:700;}

  /* ---------- forms / modal ---------- */
  #sheetOverlay{
    position:fixed; inset:0; background:rgba(10,12,8,0.6); z-index:40;
    display:none; align-items:flex-end;
  }
  #sheet{
    background:var(--bg); width:100%; max-height:90vh; overflow-y:auto;
    border-radius:20px 20px 0 0; border-top:1px solid var(--line);
    padding:16px 16px calc(20px + env(safe-area-inset-bottom));
  }
  #sheet h2{font-size:17px; margin-bottom:14px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:11.5px; color:var(--dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.6px;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--surface); border:1px solid var(--line); color:var(--parchment);
    border-radius:9px; padding:11px 12px; font-size:14.5px; font-family:'IBM Plex Sans',sans-serif;
  }
  .field input[type=date]{font-family:'IBM Plex Mono',monospace;}
  .field textarea{resize:vertical; min-height:60px;}
  .field .hint{font-size:11px; color:var(--dim); margin-top:4px;}
  .toggle-row{display:flex; gap:8px;}
  .toggle-row button{
    flex:1; padding:10px; border-radius:9px; border:1px solid var(--line); background:var(--surface);
    color:var(--dim); font-size:13px; font-weight:600;
  }
  .toggle-row button.active.committed{background:rgba(217,164,65,0.2); color:var(--amber); border-color:var(--amber);}
  .toggle-row button.active.actual{background:rgba(146,168,90,0.2); color:var(--leaf); border-color:var(--leaf);}
  .toggle-row button.active.issued{background:rgba(217,164,65,0.2); color:var(--amber); border-color:var(--amber);}
  .toggle-row button.active.received{background:rgba(146,168,90,0.2); color:var(--leaf); border-color:var(--leaf);}
  .sheet-actions{display:flex; gap:10px; margin-top:6px;}
  .btn{
    flex:1; padding:13px; border-radius:10px; border:none; font-weight:700; font-size:14px;
    font-family:'Space Grotesk','Trebuchet MS',sans-serif;
  }
  .btn-primary{background:var(--clay); color:#20140a;}
  .btn-ghost{background:var(--surface-2); color:var(--parchment);}
  .btn-danger{background:rgba(194,69,58,0.18); color:#EF9990;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .close-x{position:absolute; right:16px; top:16px; color:var(--dim); font-size:22px; background:none; border:none;}
  #sheet{position:relative;}

  .settings-section{margin-bottom:18px;}
  .settings-section h3{font-size:12.5px; text-transform:uppercase; letter-spacing:1px; color:var(--clay); margin-bottom:10px;}
  .list-row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
  .list-row input{flex:1;}
  .list-row .rm{background:var(--surface-2); border:1px solid var(--line); color:var(--danger); width:36px; height:36px; border-radius:8px; flex:none;}
  .add-row-btn{background:none; border:1px dashed var(--line); color:var(--dim); width:100%; padding:9px; border-radius:9px; font-size:12.5px;}

  .loading{display:flex; align-items:center; justify-content:center; height:60vh; color:var(--dim); font-size:13px;}
  .note{font-size:11.5px; color:var(--dim); line-height:1.5; margin-top:2px;}
  a.linklike{color:var(--clay);}

  /* ---------- report documents ---------- */
  .report-doc{background:var(--surface-2); border-radius:10px; padding:14px; max-height:52vh; overflow-y:auto;}
  .report-doc h3{font-size:12.5px; text-transform:uppercase; letter-spacing:0.8px; color:var(--clay); margin:14px 0 6px;}
  .report-doc h3:first-of-type{margin-top:0;}
  .report-doc p{margin:4px 0 10px; font-size:12.5px; line-height:1.55; color:var(--parchment);}
  .report-doc table{width:100%; border-collapse:collapse; margin:8px 0; font-size:11.5px;}
  .report-doc th,.report-doc td{border:1px solid var(--line); padding:5px 7px; text-align:left; color:var(--parchment);}
  .report-doc .doc-header{display:flex; align-items:center; gap:10px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--line);}
  .report-doc .doc-header img{width:40px; height:40px; border-radius:8px; object-fit:cover; background:#fff; flex:none;}
  .report-doc .doc-header h1{font-size:15px; line-height:1.3;}

  #printArea{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{
      display:block; position:absolute; left:0; top:0; width:100%;
      background:#fff; color:#111; padding:28px;
      font-family: Georgia, 'Times New Roman', serif;
    }
    #printArea .report-doc{max-height:none; overflow:visible; background:none; padding:0;}
    #printArea h3{color:#111; border-bottom:1px solid #333; padding-bottom:3px;}
    #printArea p, #printArea td, #printArea th{color:#111;}
    #printArea table, #printArea th, #printArea td{border-color:#333;}
    #printArea .doc-header{border-color:#333;}
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand-group">
    <img class="brand-logo" src="assets/bebi-project-logo.png" alt="Bebi Project logo">
    <div class="brand">
      <div class="eyebrow">Cross River State &middot; 2026</div>
      <h1 id="brandTitle">Bebi Field Ledger</h1>
      <div class="sub" id="brandSub">loading…</div>
    </div>
  </div>
  <button id="settingsBtn" onclick="openSettings()">&#9881;</button>
</div>

<div id="exceptionBanner"></div>

<main id="view">
  <div class="loading">Loading your data…</div>
</main>

<div id="bottomnav">
  <button data-tab="dashboard" onclick="setTab('dashboard')"><span class="ic">&#9673;</span>Dashboard</button>
  <button data-tab="expenses" onclick="setTab('expenses')"><span class="ic">&#8358;</span>Expenses</button>
  <button data-tab="output" onclick="setTab('output')"><span class="ic">&#127807;</span>Output</button>
  <button data-tab="fieldops" onclick="setTab('fieldops')"><span class="ic">&#9981;</span>Field Ops</button>

  <button data-tab="reports" onclick="setTab('reports')"><span class="ic">&#128196;</span>Reports</button>
</div>

<div id="printArea"></div>

<div id="sheetOverlay" onclick="if(event.target===this) closeSheet()">
  <div id="sheet"></div>
</div>

    budgetVariations: [],
    asOfDate: todayStr(),
    configUpdatedAt: Date.now()
  };
}

let state = null;
let currentTab = "dashboard";
let fieldOpsSub = "diesel";
let editing = {type:null, id:null};

/* ---------------- storage ---------------- */
async function loadState(){
  if(hasCloudStorage){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){ return JSON.parse(res.value); }
    }catch(e){ /* key not found yet -> fall through to defaults */ }
    return defaultState();
  } else {
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){ console.warn("local storage read failed", e); }
    return defaultState();
  }
}

async function saveState(){
  const json = JSON.stringify(state);
  if(hasCloudStorage){
    try{
      const res = await window.storage.set(STORAGE_KEY, json, false);
      if(!res) console.warn("storage.set returned falsy");
    }catch(e){ console.error("cloud storage save failed", e); }
  } else {
    try{ localStorage.setItem(STORAGE_KEY, json); }
    catch(e){ console.error("local storage save failed", e); }
  }
  if(driveAccessToken) driveSyncNow();
}

/* soft-deleted records stay in the arrays (so deletes can sync) but are hidden everywhere else */
function active(arr){ return (arr||[]).filter(x=>!x.deleted); }

/* ---------------- helpers ---------------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ const d = new Date(); return d.toISOString().slice(0,10); }
function addDays(dateStr, n){ const d = new Date(dateStr+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function daysBetween(a,b){ const da=new Date(a+"T00:00:00"), db=new Date(b+"T00:00:00"); return Math.round((db-da)/86400000); }
function fmtN(n){ n = Number(n)||0; const neg = n<0; n=Math.abs(n); const s = "₦"+n.toLocaleString('en-NG',{maximumFractionDigits:0}); return neg? "-"+s : s; }
function fmtNum(n, dp){ if(n===null||n===undefined||n==="") return "–"; return Number(n).toLocaleString('en-NG',{minimumFractionDigits:dp||0,maximumFractionDigits:dp||0}); }
function fmtPct(n){ if(n===null||n===undefined||n==="") return "–"; return (Number(n)*100).toFixed(1)+"%"; }
function fmtDate(s){ if(!s) return "–"; const d=new Date(s+"T00:00:00"); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s){ return (s===undefined||s===null)?"":String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function ragClass(r){ if(r==="Healthy") return "healthy"; if(r==="Watch") return "watch"; if(r==="Critical") return "critical"; if(r==="Over Budget") return "over"; return "neutral"; }

/* ---------------- core calculations (mirrors the Excel workbook) ---------------- */
function calcBudgetVsActual(){
  return state.costHeads.map(ch=>{
    const committed = active(state.expenses).filter(e=>e.costHead===ch.name && e.txnType==="Committed").reduce((s,e)=>s+Number(e.amount||0),0);
    const actual = active(state.expenses).filter(e=>e.costHead===ch.name && e.txnType==="Actual").reduce((s,e)=>s+Number(e.amount||0),0);
    const total = committed+actual;
    const balance = ch.budget-total;
    const pct = ch.budget>0 ? total/ch.budget : null;
    let rag = "Healthy";
    if(pct!==null){
      if(pct>=1) rag="Over Budget";
      else if(pct>=state.thresholds.critical) rag="Critical";
      else if(pct>=state.thresholds.watch) rag="Watch";
    }
    return {name:ch.name, budget:ch.budget, committed, actual, total, balance, pct, rag};
  });
}
function totalsFromBVA(bva){
  return bva.reduce((acc,r)=>{acc.budget+=r.budget; acc.committed+=r.committed; acc.actual+=r.actual; acc.total+=r.total; acc.balance+=r.balance; return acc;}, {budget:0,committed:0,actual:0,total:0,balance:0});
}

function calcRetirement(){
  return active(state.advances).map(a=>{
    const retired = active(state.expenses).filter(e=>e.advanceRef===a.id).reduce((s,e)=>s+Number(e.amount||0),0);
    const balance = a.amount-retired;
    let status = "Pending";
    if(retired>=a.amount && a.amount>0) status="Fully Retired";
    else if(retired>0) status="Partially Retired";
    const daysOut = status==="Fully Retired" ? null : daysBetween(a.date, state.asOfDate);
    const overdue = daysOut!==null && daysOut>state.thresholds.overdueDays;
    return {...a, retired, balance, status, daysOut, overdue};
  });
}

function haCoveredFor(date, operation){
  if(!operation) return 0;
  return active(state.productivity).filter(p=>p.date===date && p.operation===operation).reduce((s,p)=>s+Number(p.ha||0),0);
}

function calcDiesel(){
  const rows = [...active(state.dieselLog)].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  let running = state.diesel.openingStock;
  let cumCost = 0;
  const out = rows.map(r=>{
    const opening = running;
    const closing = opening + Number(r.received||0) - Number(r.issued||0);
    running = closing;
    const ha = haCoveredFor(r.date, r.operation);
    const litresPerHa = (r.issued && ha) ? (Number(r.issued)/ha) : null;
    const cost = Number(r.issued||0) * state.diesel.unitCost;
    cumCost += cost;
    return {...r, opening, closing, ha, litresPerHa, cost, cumCost};
  });
  const currentStock = out.length ? out[out.length-1].closing : state.diesel.openingStock;
  const totalIssued = out.reduce((s,r)=>s+Number(r.issued||0),0);
  const avgDaily = out.length ? totalIssued/out.length : 0;
  const daysRemaining = avgDaily>0 ? currentStock/avgDaily : null;
  const stockOutDate = daysRemaining!==null ? addDays(todayStr(), Math.round(daysRemaining)) : null;
  const totalDieselCost = out.length ? out[out.length-1].cumCost : 0;
  const fuelingActual = active(state.expenses).filter(e=>e.costHead==="Fueling (AGO)" && e.txnType==="Actual").reduce((s,e)=>s+Number(e.amount||0),0);
  const reconciled = Math.abs(totalDieselCost-fuelingActual) < 1;
  return {rows: out, currentStock, totalIssued, avgDaily, daysRemaining, stockOutDate, totalDieselCost, fuelingActual, reconciled};
}

function calcMachine(){
  const rows = active(state.machineLog).map(r=>{
    const machine = state.machines.find(m=>m.id===r.machineId);
    const stdHours = machine ? machine.hoursPerDay : null;
    const utilization = stdHours ? Number(r.hoursWorked||0)/stdHours : null;
    const ha = haCoveredFor(r.date, r.operation);
    const rate = (r.hoursWorked && ha) ? ha/Number(r.hoursWorked) : null;
    return {...r, utilization, ha, rate};
  });
  const totalWorked = rows.reduce((s,r)=>s+Number(r.hoursWorked||0),0);
  const totalIdle = rows.reduce((s,r)=>s+Number(r.idle||0),0);
  const totalBreakdown = rows.reduce((s,r)=>s+Number(r.breakdown||0),0);
  const denom = totalWorked+totalIdle+totalBreakdown;
  const overallUtil = denom>0 ? totalWorked/denom : null;
  const totalHa = rows.reduce((s,r)=>s+Number(r.ha||0),0);
  const avgProductivity = totalWorked>0 ? totalHa/totalWorked : null;
  return {rows, totalWorked, totalIdle, totalBreakdown, overallUtil, avgProductivity};
}

function calcProductivity(){
  const perOp = state.operations.map(op=>{
    const achieved = active(state.productivity).filter(p=>p.operation===op.name).reduce((s,p)=>s+Number(p.ha||0),0);
    const pct = op.target>0 ? achieved/op.target : null;
    return {name:op.name, target:op.target, achieved, pct};
  });
  const overall = perOp.length ? perOp.reduce((s,o)=>s+(o.pct||0),0)/perOp.length : 0;
  const totalTargetHa = state.operations.reduce((s,o)=>s+Number(o.target||0),0);
  return {perOp, overall, totalTargetHa};
}

function calcEVM(){
  const bva = calcBudgetVsActual();
  const totals = totalsFromBVA(bva);
  const prod = calcProductivity();
  const BAC = totals.budget;
  const daysElapsed = Math.max(0, Math.min(state.project.days, daysBetween(state.project.startDate, state.asOfDate)+1));
  const PV = BAC * Math.min(1, daysElapsed/state.project.days);
  const EV = BAC * prod.overall;
  const AC = totals.actual;
  const CV = EV-AC;
  const SV = EV-PV;
  const CPI = AC>0 ? EV/AC : null;
  const SPI = PV>0 ? EV/PV : null;
  const EAC = (CPI && CPI>0) ? AC+(BAC-EV)/CPI : null;
  const ETC = EAC!==null ? EAC-AC : null;
  const VAC = EAC!==null ? BAC-EAC : null;
  function health(v){ if(v===null) return "–"; if(v>=1) return "Healthy"; if(v>=0.9) return "Watch"; return "Critical"; }
  return {BAC, daysElapsed, plannedDuration:state.project.days, PV, EV, AC, CV, SV, CPI, SPI, EAC, ETC, VAC,
           costHealth: health(CPI), schedHealth: health(SPI), overallProgress: prod.overall};
}

function calcSCurve(){
  const bva = calcBudgetVsActual();
  const totals = totalsFromBVA(bva);
  const BAC = totals.budget;
  const totalTargetHa = state.operations.reduce((s,o)=>s+Number(o.target||0),0);
  const out = [];
  for(let d=0; d<state.project.days; d++){
    const date = addDays(state.project.startDate, d);
    const cumPV = BAC*Math.min(1,(d+1)/state.project.days);
    const haToDate = active(state.productivity).filter(p=>p.date<=date).reduce((s,p)=>s+Number(p.ha||0),0);
    const cumEV = BAC*(totalTargetHa>0 ? haToDate/totalTargetHa : 0);
    const cumAC = active(state.expenses).filter(e=>e.txnType==="Actual" && e.date<=date).reduce((s,e)=>s+Number(e.amount||0),0);
    out.push({date, cumPV, cumEV, cumAC});
  }
  return out;
}

function exceptionList(){
  const bva = calcBudgetVsActual();
  const ret = calcRetirement();
  const issues = [];
  bva.filter(r=>r.rag==="Critical"||r.rag==="Over Budget").forEach(r=>issues.push(`${r.name} is ${r.rag.toLowerCase()} (${fmtPct(r.pct)} consumed)`));
  ret.filter(r=>r.overdue).forEach(r=>issues.push(`Advance to ${r.releasedTo} is overdue (${r.daysOut} days)`));
  return issues;
}

/* ================= STOCK / INVENTORY ================= */
function calcStock(){
  return state.stockItems.map(item=>{
    const rows = active(state.stockLog).filter(r=>r.itemName===item.name);
    const received = rows.filter(r=>r.movement==="Received").reduce((s,r)=>s+Number(r.quantity||0),0);
    const issued = rows.filter(r=>r.movement==="Issued").reduce((s,r)=>s+Number(r.quantity||0),0);
    return {...item, received, issued, balance: received-issued};
  });
}
function renderStockTab(){
  if(!state.stockItems.length){
    return emptyState("📦","No stock items set up yet","Add fertilizer, seedling, or herbicide items in Settings first.");
  }
  const stock = calcStock();
  const byCategory = {};
  stock.forEach(s=>{ (byCategory[s.category]=byCategory[s.category]||[]).push(s); });
  const summary = `<div class="card"><div class="card-title">Current stock balance</div>` +
    Object.keys(byCategory).map(cat=>`
      <div style="margin-bottom:10px;">
        <div style="font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px;">${esc(cat)}</div>

          ${byCategory[cat].map(s=>`
            <div class="stat">
              <div class="label">${esc(s.name)}</div>
              <div class="value small">${fmtNum(s.balance,s.balance%1===0?0:1)} ${esc(s.unit)} ${s.balance<=0?'<span class="chip critical">Out</span>':''}</div>
            </div>`).join("")}
        </div>
      </div>`).join("") + `</div>`;
  const rows = [...active(state.stockLog)].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);
  const body = rows.length ? rows.map(r=>`
    <div class="entry" onclick="openStockForm('${r.id}')">

    </div>`).join("") : emptyState("📦","No stock movements yet","Log deliveries and usage of fertilizer, seedlings and herbicides here.");

function saveStock(){
  let itemName = val('f_itemName');
  if(itemName==='__new__'){
    const name = val('f_newItemName').trim();
    const unit = val('f_newItemUnit').trim();
    if(!name || !unit){ alert('Enter both the item name and its packaging type.'); return; }
    if(!state.stockItems.some(it=>it.name===name)){
      state.stockItems.push({name, category: val('f_newItemCategory')||'Other', unit});
      state.configUpdatedAt = Date.now();
    }
    itemName = name;
  }
  const rec = {id:editing.id||uid(), date:val('f_date'), itemName, movement:val('f_movement')||'Received', quantity:Number(val('f_quantity'))||0, purpose:val('f_purpose'), remarks:val('f_remarks')};
  upsert('stockLog', rec);
  closeSheet(); saveState(); render();
}

function saveReport(){
  const type = editing.reportType;
  let fields = {};
  if(type==="progress"){
    fields = {
      reportDate: val('f_reportDate'), initialPlanNotes: val('f_initialPlanNotes'), varianceNotes: val('f_varianceNotes'),
      factorsAffectingPace: val('f_factorsAffectingPace'), revenueReceived: Number(val('f_revenueReceived'))||0,
      tractorHiringIncome: Number(val('f_tractorHiringIncome'))||0, fundsRequestReason: val('f_fundsRequestReason'),
      recommendation: val('f_recommendation'), preparedBy: val('f_preparedBy')
    };
  } else if(type==="final"){
    fields = {
      reportTitle: val('f_reportTitle'), introduction: val('f_introduction'), scopeNotes: val('f_scopeNotes'),
      paymentReceivedNotes: val('f_paymentReceivedNotes'), fundReconciliationNotes: val('f_fundReconciliationNotes'),
      challengesNotes: val('f_challengesNotes'), recommendationsNotes: val('f_recommendationsNotes'), conclusionNotes: val('f_conclusionNotes'),
      preparedBy: val('f_preparedBy'), preparedDesignation: val('f_preparedDesignation'),
      checkedBy: val('f_checkedBy'), checkedDesignation: val('f_checkedDesignation'),
      verifiedBy: val('f_verifiedBy'), verifiedDesignation: val('f_verifiedDesignation')
    };
  } else {
    fields = {
      requestDate: val('f_requestDate'), category: val('f_category'), itemDescription: val('f_itemDescription'),
      quantity: val('f_quantity'), unit: val('f_unit'), amountNaira: Number(val('f_amountNaira'))||0,
      urgency: val('f_urgency')||'Normal', requestedBy: val('f_requestedBy'), justification: val('f_justification')
    };
  }
  const rec = {id: editing.id||uid(), type, fields};
  upsert('reports', rec);
  closeSheet(); saveState(); render();
}
function buildDocHeader(title, subtitle){
  return `<div class="doc-header">

function nl2br(s){ return esc(s||"—").replace(/\n/g,"<br>"); }
function buildProgressReportHTML(r){
  const f = r.fields||{};

  const revenue = Number(f.revenueReceived)||0;
  const hiring = Number(f.tractorHiringIncome)||0;
  const expenditure = totals.actual;
  const profitWithHiring = revenue + hiring - expenditure;
  const profitWithoutHiring = revenue - expenditure;
  const milestoneRows = prod.perOp.map(o=>`<tr><td>${esc(o.name)}</td><td>${o.target}</td><td>${fmtNum(o.achieved,2)}</td><td>${fmtPct(o.pct)}</td></tr>`).join("");

function viewReport(id){
  const r = state.reports.find(x=>x.id===id);
  if(!r) return;
  openSheet(`
    <h2>${esc(reportTitleFor(r))}</h2>
    <div class="report-doc">${buildReportHTML(r)}</div>
    <div class="sheet-actions" style="margin-top:12px;">
      <button class="btn btn-ghost" onclick="openReportForm('${r.type}','${id}')">Edit</button>
      <button class="btn btn-primary" onclick="printReport('${id}')">Print as PDF</button>
    </div>
    <div class="field" style="margin-top:14px;">
      <label>Send to email(s)</label>
      <input id="reportEmailTo" placeholder="name@example.com, name2@example.com">
      <div class="hint">Opens your email app. For Progress/Final reports, print the PDF first and attach it — email links can't attach files automatically.</div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-primary" onclick="emailReport('${id}')">Submit to Email</button>
    </div>
  `);
}
function printReport(id){
  const r = state.reports.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('printArea').innerHTML = `<div class="report-doc">${buildReportHTML(r)}</div>`;
  window.print();
}
function plainTextForRequest(r){
  const f = r.fields||{};
  return [
    `Category: ${f.category||""}`,
    `Requested By: ${f.requestedBy||""}`,
    `Date: ${fmtDate(f.requestDate)}`,
    `Urgency: ${f.urgency||""}`,
    `Item: ${f.itemDescription||""}`,
    `Quantity: ${f.quantity||""} ${f.unit||""}`,
    f.amountNaira?`Estimated Cost: ${fmtN(f.amountNaira)}`:null,
    ``,
    `Justification:`,
    f.justification||""
  ].filter(x=>x!==null).join("\n");
}
function emailReport(id){
  const r = state.reports.find(x=>x.id===id);
  if(!r) return;
  const to = val('reportEmailTo').split(/[,;]+/).map(s=>s.trim()).filter(Boolean).join(',');
  if(!to){ alert('Enter at least one email address.'); return; }
  const subject = encodeURIComponent(reportTitleFor(r));
  const bodyText = r.type==="request" ? plainTextForRequest(r)
    : `${reportTitleFor(r)}\n\nSee the attached PDF for the full report.\nUse "Print as PDF" in the app, save the file, then attach it here — email links can't attach files automatically.\n\n— sent from Bebi Field Ledger`;
  window.location.href = `mailto:${to}?subject=${subject}&body=${encodeURIComponent(bodyText)}`;
}

function bvUpdateCurrent(){
  const ch = state.costHeads.find(c=>c.name===val('bv_costHead'));
  document.getElementById('bv_current').value = fmtN(ch?ch.budget:0);
  document.getElementById('bv_newBudget').value = ch?ch.budget:0;
}
function saveBudgetVariation(){
  const ch = state.costHeads.find(c=>c.name===val('bv_costHead'));
  if(!ch) return;
  const previousBudget = ch.budget;
  const newBudget = Number(val('bv_newBudget'))||0;
  const rec = {id:uid(), costHead:ch.name, date:val('bv_date'), previousBudget, newBudget,
    changeAmount: newBudget-previousBudget, reason:val('bv_reason'), approvedBy:val('bv_approvedBy')};
  upsert('budgetVariations', rec);
  ch.budget = newBudget;
  state.configUpdatedAt = Date.now();
  saveState(); openSettings();
}

          <input data-si-category value="${esc(it.category)}" placeholder="Category" style="max-width:110px;">
          <input data-si-unit value="${esc(it.unit)}" placeholder="e.g. 1L Bottle" style="max-width:110px;">
          <button class="rm" onclick="this.parentElement.remove()">✕</button>
        </div>`).join("")}</div>
      <button class="add-row-btn" onclick="addRow('stockItemRows','<input data-si-name placeholder=\\'e.g. Glyphosate 41% SL\\'><input data-si-category placeholder=\\'Category\\' style=\\'max-width:110px;\\'><input data-si-unit placeholder=\\'e.g. 1L Bottle\\' style=\\'max-width:110px;\\'>')">+ Add stock item</button>
      <div class="note">Each herbicide can have its own name and packaging type (e.g. "Glyphosate 41% SL" · "1L Bottle" vs "Atrazine 50% WP" · "500g Sachet") — they're tracked as separate stock items. You can also add a new item directly from the "Log stock movement" form. Remember to click Save Settings below after adding or removing items here.</div>
    </div>

    <div class="settings-section">
      <h3>Operations &amp; targets (Ha)</h3>
      <div id="opRows">${state.operations.map(o=>`
        <div class="list-row">
          <input data-op-name value="${esc(o.name)}" placeholder="Operation">
          <input data-op-target type="number" value="${o.target}" placeholder="Target Ha" style="max-width:100px;">
          <button class="rm" onclick="this.parentElement.remove()">✕</button>
        </div>`).join("")}</div>
      <button class="add-row-btn" onclick="addRow('opRows','<input data-op-name placeholder=\\'Operation\\'><input data-op-target type=\\'number\\' placeholder=\\'Target Ha\\' style=\\'max-width:100px;\\'>')">+ Add operation</button>
    </div>

    <div class="settings-section">
      <h3>Thresholds</h3>
      <div class="row2">
        <div class="field"><label>Watch (%)</label><input type="number" id="s_watch" value="${state.thresholds.watch*100}"></div>
        <div class="field"><label>Critical (%)</label><input type="number" id="s_critical" value="${state.thresholds.critical*100}"></div>
      </div>
      <div class="field"><label>Advance Overdue After (days)</label><input type="number" id="s_overdueDays" value="${state.thresholds.overdueDays}"></div>
    </div>

    <div class="settings-section">
      <h3>Diesel</h3>
      <div class="row2">
        <div class="field"><label>Unit Cost (₦/L)</label><input type="number" id="s_unitCost" value="${state.diesel.unitCost}"></div>
        <div class="field"><label>Opening Stock (L)</label><input type="number" id="s_openingStock" value="${state.diesel.openingStock}"></div>
      </div>
    </div>

    <div class="sheet-actions"><button class="btn btn-primary" onclick="saveSettings()">Save settings</button></div>

    <div class="settings-section" style="margin-top:22px;">
      <h3>Google Drive Sync</h3>
      <div class="note">${driveStatusNote()}</div>
      <div class="sheet-actions" style="margin-top:10px;">
        ${driveStatus==="connected" ? `
          <button class="btn btn-ghost" onclick="driveSyncNow()">Sync now</button>
          <button class="btn btn-danger" onclick="driveDisconnect()">Disconnect</button>
        ` : `
          <button class="btn btn-primary" onclick="driveConnect()">${driveStatus==="connecting"?"Connecting…":"Connect Google Drive"}</button>
        `}
      </div>
    </div>

    <div class="settings-section" style="margin-top:22px;">
      <h3>Data</h3>
      <div class="sheet-actions">
        <button class="btn btn-ghost" onclick="exportData()">Export backup (.json)</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">Import backup</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this.files[0])">
      <div class="note">Everything is stored on this device (or your Claude account, when opened as an Artifact) — export a backup now and then so a lost phone doesn't lose your field records.</div>
      <div class="sheet-actions" style="margin-top:10px;">
        <button class="btn btn-danger" onclick="if(confirm('This clears every entry on this device. Export a backup first. Continue?')) resetAll()">Reset all data</button>
      </div>
    </div>
  `);
}
function addRow(containerId, html){
  const div = document.createElement('div'); div.className='list-row';
  div.innerHTML = html + `<button class="rm" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById(containerId).appendChild(div);
}
function saveSettings(){
  state.project.name = val('s_name'); state.project.site = val('s_site');
  state.project.startDate = val('s_startDate'); state.project.days = Number(val('s_days'))||20;
  state.project.manager = val('s_manager');
  state.costHeads = [...document.querySelectorAll('#chRows .list-row')].map(row=>({
    name: row.querySelector('[data-ch-name]').value.trim(),
    budget: Number(row.querySelector('[data-ch-budget]').value)||0
  })).filter(c=>c.name);
  state.operations = [...document.querySelectorAll('#opRows .list-row')].map(row=>({
    name: row.querySelector('[data-op-name]').value.trim(),
    target: Number(row.querySelector('[data-op-target]').value)||0,
    rate: null
  })).filter(o=>o.name);
  state.stockItems = [...document.querySelectorAll('#stockItemRows .list-row')].map(row=>({
    name: row.querySelector('[data-si-name]').value.trim(),
    category: row.querySelector('[data-si-category]').value.trim() || "Other",
    unit: row.querySelector('[data-si-unit]').value.trim() || "units"
  })).filter(s=>s.name);
  state.thresholds.watch = (Number(val('s_watch'))||60)/100;
  state.thresholds.critical = (Number(val('s_critical'))||85)/100;
  state.thresholds.overdueDays = Number(val('s_overdueDays'))||14;
  state.diesel.unitCost = Number(val('s_unitCost'))||0;
  state.diesel.openingStock = Number(val('s_openingStock'))||0;
  state.configUpdatedAt = Date.now();
  closeSheet(); saveState(); render();
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bebi-field-ledger-backup-'+todayStr()+'.json';
  a.click();
}
function importData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      state = data; closeSheet(); saveState(); render();
      alert('Backup imported.');
    }catch(err){ alert('That file could not be read as a backup.'); }
  };
  reader.readAsText(file);
}
function resetAll(){ state = defaultState(); saveState(); closeSheet(); render(); }

/* ================= GOOGLE DRIVE SYNC ================= */
function driveEnsureTokenClient(){
  if(driveTokenClient) return driveTokenClient;
  driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp)=>{
      if(!resp || resp.error){
        driveStatus = "error"; driveErrorMsg = (resp&&resp.error)||"sign-in failed";
        refreshSettingsIfOpen(); return;
      }
      driveAccessToken = resp.access_token;
      try{ localStorage.setItem(DRIVE_AUTOCONNECT_KEY, "1"); }catch(e){}
      driveStatus = "connected";
      driveSyncNow();
    }
  });
  return driveTokenClient;
}
function driveConnect(){
  if(typeof google === "undefined" || !google.accounts){
    driveStatus = "error"; driveErrorMsg = "Google sign-in script didn't load — check your connection.";
    refreshSettingsIfOpen(); return;
  }
  driveStatus = "connecting"; refreshSettingsIfOpen();
  driveEnsureTokenClient().requestAccessToken({prompt:"consent"});
}
function driveTryAutoConnect(){
  let want = false;
  try{ want = localStorage.getItem(DRIVE_AUTOCONNECT_KEY)==="1"; }catch(e){}
  if(!want) return;
  if(typeof google === "undefined" || !google.accounts) return;
  driveEnsureTokenClient().requestAccessToken({prompt:""});
}
function driveDisconnect(){
  if(driveAccessToken && typeof google!=="undefined" && google.accounts){
    try{ google.accounts.oauth2.revoke(driveAccessToken, ()=>{}); }catch(e){}
  }
  driveAccessToken = null; driveFileId = null; driveStatus = "disconnected"; driveErrorMsg = ""; driveLastSync = null;
  try{ localStorage.removeItem(DRIVE_AUTOCONNECT_KEY); }catch(e){}
  refreshSettingsIfOpen();
}
async function driveFindFile(){
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&spaces=drive`, {
    headers:{Authorization:`Bearer ${driveAccessToken}`}
  });
  if(!res.ok) throw new Error("drive-list-failed-"+res.status);
  const data = await res.json();
  return (data.files && data.files.length) ? data.files[0] : null;
}
async function driveCreateFile(contentObj){
  const boundary = "bebilledgerboundary";
  const metadata = {name: DRIVE_FILE_NAME, mimeType:"application/json"};
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(contentObj)}\r\n`+
    `--${boundary}--`;
  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
    method:"POST",
    headers:{Authorization:`Bearer ${driveAccessToken}`, "Content-Type":`multipart/related; boundary=${boundary}`},
    body
  });
  if(!res.ok) throw new Error("drive-create-failed-"+res.status);
  const data = await res.json();
  return data.id;
}
async function driveDownloadFile(fileId){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers:{Authorization:`Bearer ${driveAccessToken}`}
  });
  if(!res.ok) throw new Error("drive-download-failed-"+res.status);
  return await res.json();
}
async function driveUpdateFile(fileId, contentObj){
  const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method:"PATCH",
    headers:{Authorization:`Bearer ${driveAccessToken}`, "Content-Type":"application/json"},
    body: JSON.stringify(contentObj)
  });
  if(!res.ok) throw new Error("drive-update-failed-"+res.status);
}
function mergeArraysById(localArr, remoteArr){
  const map = new Map();
  (remoteArr||[]).forEach(r=>map.set(r.id, r));
  (localArr||[]).forEach(l=>{
    const r = map.get(l.id);
    if(!r){ map.set(l.id, l); return; }
    map.set(l.id, (l.updatedAt||0) >= (r.updatedAt||0) ? l : r);
  });
  return [...map.values()];
}
function mergeStates(local, remote){
  if(!remote) return local;
  const merged = {...local};
  ["expenses","productivity","advances","dieselLog","machineLog","reports","stockLog","budgetVariations"].forEach(key=>{
    merged[key] = mergeArraysById(local[key]||[], remote[key]||[]);
  });
  if((remote.configUpdatedAt||0) > (local.configUpdatedAt||0)){
    ["project","costHeads","operations","thresholds","diesel","machines","stockItems","txnTypes","paymentSources","txnStatuses"].forEach(key=>{
      merged[key] = remote[key];
    });
    merged.configUpdatedAt = remote.configUpdatedAt;
  }
  return merged;
}
async function driveSyncNow(){
  if(!driveAccessToken || driveSyncInFlight) return;
  driveSyncInFlight = true;
  try{
    if(!driveFileId){
      const found = await driveFindFile();
      if(found) driveFileId = found.id;
    }
    let remote = null;
    if(driveFileId) remote = await driveDownloadFile(driveFileId);
    state = mergeStates(state, remote);
    await saveState();
    if(!driveFileId) driveFileId = await driveCreateFile(state);
    else await driveUpdateFile(driveFileId, state);
    driveLastSync = new Date();
    driveStatus = "connected"; driveErrorMsg = "";
  }catch(err){
    console.error("drive sync failed", err);
    driveStatus = "error"; driveErrorMsg = String((err&&err.message)||err);
  }
  driveSyncInFlight = false;
  render();
  refreshSettingsIfOpen();
}
function refreshSettingsIfOpen(){ if(settingsSheetOpen) openSettings(); }
function driveStatusNote(){
  if(driveStatus==="connected"){
    return "Connected — " + (driveLastSync ? "last synced "+driveLastSync.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : "syncing…") + ". Entries saved on this device are pushed to the shared Drive file, and entries from other devices are pulled in automatically.";
  }
  if(driveStatus==="connecting") return "Connecting to Google…";
  if(driveStatus==="error") return "Sync error: " + esc(driveErrorMsg) + ". Try Connect again.";
  return "Not connected. The first person to connect creates the shared file — then share it (Editor access) with your teammates from Google Drive so their sign-in can sync to the same file.";
}

/* ================= GENERIC HELPERS ================= */
function val(id){ const el = document.getElementById(id); return el ? el.value : ""; }
function upsert(arrName, rec){
  rec.updatedAt = Date.now();
  const arr = state[arrName];
  const idx = arr.findIndex(x=>x.id===rec.id);
  if(idx>=0) arr[idx]=rec; else arr.push(rec);
}
function deleteEntry(arrName, id){
  const rec = state[arrName].find(x=>x.id===id);
  if(rec){ rec.deleted = true; rec.updatedAt = Date.now(); }
  closeSheet(); saveState(); render();
}
function fab(label, onclick){
  return `<div class="fab-row"><button class="fab" onclick="${onclick}">+ ${label}</button></div>`;
}
function emptyState(icon, title, sub){
  return `<div class="empty-state"><div class="big">${icon}</div><div style="color:var(--parchment); font-weight:500; margin-bottom:4px;">${title}</div><div>${sub}</div></div>`;
}
function openSheet(html){
  document.getElementById('sheet').innerHTML = `<button class="close-x" onclick="closeSheet()">&times;</button>` + html;
  document.getElementById('sheetOverlay').style.display = 'flex';
}
function closeSheet(){ document.getElementById('sheetOverlay').style.display = 'none'; editing={type:null,id:null}; settingsSheetOpen=false; }

/* ================= BOOT ================= */
function normalizeState(s){
  const d = defaultState();
  Object.keys(d).forEach(k=>{ if(s[k]===undefined) s[k] = d[k]; });
  return s;
}
(async function init(){
  state = normalizeState(await loadState());
  if(!state.asOfDate) state.asOfDate = todayStr();
  setTab('dashboard');
  setTimeout(driveTryAutoConnect, 400);
  setInterval(()=>{ if(driveAccessToken) driveSyncNow(); }, 45000);
})();
</script>
